body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #f4f6fb;
    color: #1e1e2f;
}

section {
    padding: 60px 20px;
    max-width: 1100px;
    margin: auto;
}

h2 {
    text-align: center;
    margin-bottom: 40px;
}

/* FEATURE GRID */
.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

/* CARD DESIGN */
.card {
    position: relative;
    background: white;
    border-radius: 15px;
    height: 180px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    cursor: pointer;
}

/* TITLE (always visible) */
.card h3 {
    position: absolute;
    bottom: 20px;
    left: 20px;
    margin: 0;
    z-index: 2;
}

/* HOVER OVERLAY */
.card .overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;

    color: white;
    padding: 25px;
